<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Toastify CSS and JS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h1 class="text-center mb-4">Registration Form</h1>
                <form th:action="@{/api/users/register}" method="post">
                    <div class="mb-3">
                        <label for="role" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="name&surname" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <!-- Fixed class to "form-control" -->
                        <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <input type="text" id="role" name="role" class="form-control" placeholder="ADMIN or USER" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>

                    <!-- Extra Login Button -->
                    <div class="d-grid gap-2 mt-3">
                        <a th:href="@{https://login-9xpv.onrender.com}" class="btn btn-outline-secondary btn-lg">Already Registered? Login</a>
                    </div>


                </form>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let errorMessage = [[${error}]];
    let successMessage = [[${success}]];

    if (errorMessage) {
        Toastify({
            text: errorMessage,
            duration: 4000,
            gravity: "top",
            position: "right",
            stopOnFocus: true,
            style: { background: "#dc3545" } // Bootstrap danger red
        }).showToast();
    }
    // 2. Show Success Toast
    if (successMessage) {
        Toastify({
            text: successMessage,
            duration: 4000,
            gravity: "top",
            position: "right",
            stopOnFocus: true,
            style: { background: "#198754" } // Bootstrap success green
        }).showToast();


    }
</script>
</body>
</html>
